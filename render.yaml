services:
  - type: web
    name: setter-ia
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OWNER_PHONE_NUMBER
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: setter-ia-db
          property: connectionString

databases:
  - name: setter-ia-db
    plan: free
